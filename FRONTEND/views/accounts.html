<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - FinTrack</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/transactions.css">
    <link rel="stylesheet" href="../styles/accounts.css">
    <link rel="stylesheet" href="../styles/modals.css">

    <script src="../js/env.js"></script>
    <script src="../js/api.js"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>FinTrack</h1>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                </svg>
                <span>Dashboard</span>
            </a>

            <a href="transactions.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M7 16V4M17 8v12M3 20h18M3 4h18" stroke-width="2" stroke-linecap="round"></path>
                </svg>
                <span>Transactions</span>
            </a>

            <a href="accounts.html" class="nav-item active">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <rect x="3" y="6" width="18" height="12" rx="2" stroke-width="2"></rect>
                    <line x1="3" y1="10" x2="21" y2="10" stroke-width="2"></line>
                </svg>
                <span>Accounts</span>
            </a>

            <a href="budgets.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="6"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>
                <span>Budgets</span>
            </a>

            <a href="documents.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="2"></path>
                    <polyline points="14 2 14 8 20 8" stroke-width="2"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13" stroke-width="2"></line>
                    <line x1="16" y1="17" x2="8" y2="17" stroke-width="2"></line>
                    <line x1="10" y1="9" x2="8" y2="9" stroke-width="2"></line>
                </svg>
                <span>Documents</span>
            </a>

            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" stroke-width="2"></path>
                    <circle cx="12" cy="7" r="4" stroke-width="2"></circle>
                </svg>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <nav class="mobile-navbar">
            <span class="mobile-navbar-brand">FinTrack</span>
            <button class="hamburger-btn" id="hamburgerBtn" type="button">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <div class="page-container">
            <div class="page-header">
                <h2 class="page-title">Accounts</h2>
                <div class="header-actions">
                    <button data-modal-open="createModalAccount" class="btn-primary" type="button">
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19" stroke-width="2" stroke-linecap="round"></line>
                            <line x1="5" y1="12" x2="19" y2="12" stroke-width="2" stroke-linecap="round"></line>
                        </svg>
                        Add Account
                    </button>
                </div>
            </div>

            <div id="accounts-container" class="accounts-container"></div>
        </div>
    </main>

    <div class="modal" id="createModalAccount">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Add New Account</h3>
                <button class="modal-close" data-modal-close="createModalAccount" type="button">×</button>
            </div>
            <form class="modal-body" id="createAccountForm">
                <div class="form-group">
                    <label for="createAccountName">Account Name</label>
                    <input name="name" type="text" class="form-input" id="createAccountName" placeholder="e.g. Payroll Account" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" data-modal-close="createModalAccount">Cancel</button>
                    <button type="submit" class="btn-primary">Create Account</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="editModalAccount">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Edit Account</h3>
                <button class="modal-close" data-modal-close="editModalAccount" type="button">×</button>
            </div>
            <form class="modal-body" id="editAccountForm">
                <div class="form-group">
                    <label for="editAccountName">Account Name</label>
                    <input name="name" type="text" class="form-input" id="editAccountName" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" data-modal-close="editModalAccount">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="deleteModalAccount">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Delete Account</h3>
                <button class="modal-close" data-modal-close="deleteModalAccount" type="button">×</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <span id="accountNameToDelete"></span> account?</p>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" data-modal-close="deleteModalAccount" type="button">Cancel</button>
                <button class="btn-danger" id="confirmDeleteAccountBtn" type="button">Delete Account</button>
            </div>
        </div>
    </div>

    <div class="modal" id="linkedAccountModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Account Has Transactions</h3>
                <button class="modal-close" type="button" data-modal-close="linkedAccountModal">×</button>
            </div>
            <div class="modal-body">
                <p>This account has transactions linked to it.</p>
                <p style="margin-top: 1rem;">What would you like to do?</p>
            </div>
            <div class="modal-actions linked-account-buttons">
                <button class="btn-primary" id="confirmKeepAccountTransactionsBtn" type="button">
                    Delete Account and Move Transactions to General
                </button>
                <button class="btn-danger" id="confirmDeleteAccountTransactionsBtn" type="button">
                    Delete Account and Transactions
                </button>
            </div>
        </div>
    </div>

    <script src="../js/shared/modal_manager.js"></script>
    <script src="../js/features/accounts/accounts_ui.js"></script>
</div>
</body>
</html>
