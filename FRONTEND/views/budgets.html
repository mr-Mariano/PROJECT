<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgets - FinTrack</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/modals.css">
    <link rel="stylesheet" href="../styles/budgets.css">
    <link rel="stylesheet" href="../styles/transactions.css">

    <!-- CONFIG -->
    <script src="../js/env.js"></script>

    <!-- API -->
    <script src="../js/api.js"></script>

</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>FinTrack</h1>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                </svg>
                <span>Dashboard</span>
            </a>

            <a href="transactions.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M7 16V4M17 8v12M3 20h18M3 4h18" stroke-width="2" stroke-linecap="round"></path>
                </svg>
                <span>Transactions</span>
            </a>

            <a href="budgets.html" class="nav-item active">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="6"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>
                <span>Budgets</span>
            </a>

            <a href="documents.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="2"></path>
                    <polyline points="14 2 14 8 20 8" stroke-width="2"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13" stroke-width="2"></line>
                    <line x1="16" y1="17" x2="8" y2="17" stroke-width="2"></line>
                    <line x1="10" y1="9" x2="8" y2="9" stroke-width="2"></line>
                </svg>
                <span>Documents</span>
            </a>

            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" stroke-width="2"></path>
                    <circle cx="12" cy="7" r="4" stroke-width="2"></circle>
                </svg>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
         <!-- Mobile Navbar -->
        <nav class="mobile-navbar">
            <span class="mobile-navbar-brand">FinTrack</span>
            <button class="hamburger-btn" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <div class="page-container">
            <div class="page-header">
                <h2 class="page-title">Budgets</h2>
                <button class="btn-primary" id="createBudgetBtn">
                    <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19" stroke-width="2" stroke-linecap="round"></line>
                        <line x1="5" y1="12" x2="19" y2="12" stroke-width="2" stroke-linecap="round"></line>
                    </svg>
                    Create Budget
                </button>
            </div>

            <!-- Budgets Grid -->
            <div class="budgets-grid" id="budgetsContainer">

            </div>
            
        </div>
    </main>

    <!--Modals-->

    <!--Modal Create Budget-->
    <div class="modal" id="createBudgetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Budget</h3>
                <button class="modal-close" data-modal-close="createBudgetModal">×</button>
            </div>
            <div>
                <form id="createBudgetForm" class="modal-body">
                    <div class="form-group">
                        <label for="budgetName">Budget Name</label>
                        <input class="form-input" type="text" id="budgetName" name="budgetName" placeholder="e.g. Food & Dining" required>
                    </div>
                    <div class="form-group">
                        <label for="budgetLimit">Budget Limit</label>
                        <input class="form-input" type="number" id="budgetLimit" name="budgetLimit" placeholder="e.g. 500" required>
                    </div>
                    <div class="form-group">
                        <label for="budgetCategory">Category</label>
                        <select class="form-input" id="budgetCategory" name="budgetCategory" required>
                            <option value="">Select category</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-secondary" data-modal-close="createBudgetModal">Cancel</button>
                        <button
                                class="btn-primary"
                                id="createBudgetSubmitBtn"
                                type="submit">
                            Create Budget
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!--Modal Edit Budget-->
    <div class="modal" id="editBudgetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Budget</h3>
                <button class="modal-close" data-modal-close="editBudgetModal">×</button>
            </div>
            <form class="modal-body" id="editBudgetForm">
                <div class="form-group">
                    <label for="editBudgetName">Budget Name</label>
                    <input type="text" name="editBudgetName" id="editBudgetName" class="form-input" placeholder="Budget name">
                </div>
                <div class="form-group">
                    <label for="editBudgetLimit">Budget Limit</label>
                    <input type="number" name="editBudgetLimit" id="editBudgetLimit" class="form-input" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="editBudgetCategory">Category</label>
                    <select id="editBudgetCategory" name="editBudgetCategory" class="form-input">
                        <option value="">Select category</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" data-modal-close="editBudgetModal">Cancel</button>
                    <button class="btn-primary" id="saveBudgetChangesBtn" type="submit">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!--Modal Delete Budget-->
    <div class="modal" id="deleteBudgetModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Confirm Delete</h3>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <strong id="deleteBudgetName">this budget</strong>?</p>
                <p style="color: var(--muted-foreground); font-size: 0.875rem; margin-top: 0.5rem;">This action cannot be undone.</p>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" data-modal-close="deleteBudgetModal">Cancel</button>
                <button class="btn-danger" id="confirmDeleteBudgetBtn">
                    Delete
                </button>
            </div>
        </div>
    </div>
    </div>

    <!-- SHARED -->
    <script src="../js/shared/modal_manager.js"></script>
    <script src="../js/shared/sidebar.js"></script>
    <script src="../js/features/budgets/budget_ui.js"></script>

</body>
</html>
